<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miraç Arda Seçkin | Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 { color: #58a6ff; font-size: 2.8rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.3rem; color: #8b949e; margin-bottom: 20px; }
        
        .btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #2ea44f; }

        /* Proje Kartları Alanı (Grid) */
        .projects-section {
            width: 100%;
            max-width: 1000px;
        }
        .projects-section h2 {
            color: #f0f6fc;
            border-bottom: 1px solid #21262d;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
        }
        
        /* Proje Kartı Tasarımı */
        .project-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
        }
        .project-card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
        }
        .project-card h3 {
            color: #58a6ff;
            margin-top: 0;
            font-size: 1.4rem;
            text-transform: capitalize;
        }
        .project-card p {
            color: #8b949e;
            font-size: 0.95rem;
            line-height: 1.5;
            flex-grow: 1;
        }
        .project-meta {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #8b949e;
            display: flex;
            gap: 15px;
        }
        .project-link {
            display: inline-block;
            margin-top: 15px;
            color: #58a6ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .project-link:hover { text-decoration: underline; }
        
        /* Yükleniyor Yazısı */
        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: #8b949e;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>Hi, I'm Miraç Arda Seçkin! 👋</h1>
        <p class="subtitle">Software Engineering Student | Backend & AI Developer</p>
        <button class="btn" onclick="celebrate()">Celebrate! 🎉</button>
    </div>

    <div class="projects-section">
        <h2>My GitHub Projects 📂</h2>
        <div id="repos-container" class="projects-grid">
            <div class="loading">Loading projects from GitHub...</div>
        </div>
    </div>

    <script>
        // Sayfa açılınca konfeti patlat ve projeleri çek
        window.onload = function() {
            celebrate();
            fetchGitHubRepositories();
        };

        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });
        }

        // GitHub API'den projeleri otomatik çeken fonksiyon
        async function fetchGitHubRepositories() {
            const username = 'ardamiracseckin';
            const container = document.getElementById('repos-container');
            
            try {
                // En son güncellenen projeler üstte görünecek şekilde API isteği atıyoruz
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`);
                const repos = await response.json();
                
                container.innerHTML = ''; // Yükleniyor yazısını kaldır
                
                repos.forEach(repo => {
                    // Profil README deponu veya fork edilmiş (başkasından aldığın) projeleri gizlemek için filtre
                    if (repo.name.toLowerCase() !== username.toLowerCase() && !repo.fork) {
                        
                        const card = document.createElement('div');
                        card.className = 'project-card';
                        
                        // Eğer projeye açıklama yazmadıysan varsayılan bir metin gösterir
                        const description = repo.description ? repo.description : 'No description provided yet.';
                        // Projede kullanılan ana dili gösterir
                        const language = repo.language ? `🔹 ${repo.language}` : '';
                        
                        card.innerHTML = `
                            <div>
                                <h3>${repo.name.replace(/-/g, ' ')}</h3>
                                <p>${description}</p>
                            </div>
                            <div>
                                <div class="project-meta">
                                    <span>⭐ ${repo.stargazers_count}</span>
                                    <span>${language}</span>
                                </div>
                                <a href="${repo.html_url}" target="_blank" class="project-link">View on GitHub →</a>
                            </div>
                        `;
                        
                        container.appendChild(card);
                    }
                });
                
                if(container.children.length === 0) {
                    container.innerHTML = '<div class="loading">No public repositories found.</div>';
                }

            } catch (error) {
                console.error('Error fetching repos:', error);
                container.innerHTML = '<div class="loading">Failed to load projects. Please refresh the page.</div>';
            }
        }
    </script>
</body>
</html>
